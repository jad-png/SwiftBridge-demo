
spring:
  profiles:
    default: local
  application:
    name: core-converter-service
    description: SwiftBridge Core Converter Service

  servlet:
    context-path: /api/v1

  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: true
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: false

server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: /api/v1
  tomcat:
    threads:
      max: ${CONVERTER_MAX_THREADS:250}
      min-spare: ${CONVERTER_MIN_SPARE_THREADS:20}
    connection-timeout: 20000

    accept-count: ${CONVERTER_QUEUE_CAPACITY:100}

logging:
  level:
    root: INFO
    com.swiftbridge.converter: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

app:

  converter:

    field-mapping:
      enabled: true

    validation-mode: ${CONVERTER_VALIDATION_MODE:strict}

    batch:
      enabled: ${CONVERTER_BATCH_ENABLED:true}
      size: ${CONVERTER_BATCH_SIZE:50}

  security:
    internal-api-key: ${APP_SECURITY_INTERNAL_API_KEY:${INTERNAL_API_KEY:CHANGE_ME_IN_PRODUCTION}}
