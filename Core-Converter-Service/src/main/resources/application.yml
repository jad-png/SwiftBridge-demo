
spring:
  application:
    name: core-converter-service
    description: SwiftBridge Core Converter Service

  servlet:
    context-path: /api/v1

  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: true
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: false

server:
  port: 8081
  servlet:
    context-path: /api/v1
  tomcat:
    threads:
      max: 250
      min-spare: 20
    connection-timeout: 20000

    accept-count: 100

logging:
  level:
    root: INFO
    com.swiftbridge.converter: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

app:

  converter:

    field-mapping:
      enabled: true

    validation-mode: strict

    batch:
      enabled: true
      size: 50

  security:
    internal-api-key: CHANGE_ME_IN_PRODUCTION
