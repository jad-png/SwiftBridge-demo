name: SwiftBridge CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: swiftbridge-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:

  build:
    runs-on: ubuntu-latest
    name: Build & Test

    strategy:
      matrix:
        java-version: [17]
        service: [Core-Converter-Service, Orchestrator-Service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: maven

      - name: Build ${{ matrix.service }} with Maven
        run: |
          cd ${{ matrix.service }}
          mvn clean install -DskipTests -q
        continue-on-error: false

      - name: Run unit tests for ${{ matrix.service }}
        run: |
          cd ${{ matrix.service }}
          mvn test -q
        continue-on-error: false

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: |
            ${{ matrix.service }}/target/surefire-reports/TEST-*.xml
          check_name: "Test Results - ${{ matrix.service }}"

  code-quality:
    runs-on: ubuntu-latest
    name: Code Quality Check
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'
          cache: maven

      - name: Run SonarQube analysis (optional)
        run: |
          echo "SonarQube analysis step - Add SONAR_HOST_URL and SONAR_LOGIN secrets to enable"

  docker-build:
    runs-on: ubuntu-latest
    name: Build Docker Images
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: Core-Converter-Service
            image: swiftbridge-core
          - name: Orchestrator-Service
            image: swiftbridge-orchestrator

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service.name }}
          file: ./${{ matrix.service.name }}/Dockerfile
          push: false
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service.image }}:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service.image }}:${{ github.sha }}
          outputs: type=oci,dest=/tmp/${{ matrix.service.image }}.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v3
        with:
          name: docker-images
          path: /tmp/${{ matrix.service.image }}.tar
          retention-days: 1

  security-scan:
    runs-on: ubuntu-latest
    name: Security Vulnerability Scan
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    strategy:
      matrix:
        service:
          - name: Core-Converter-Service
            image: swiftbridge-core
          - name: Orchestrator-Service
            image: swiftbridge-orchestrator

    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v3
        with:
          name: docker-images
          path: /tmp

      - name: Load Docker image
        run: |
          docker load --input /tmp/${{ matrix.service.image }}.tar

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          input: /tmp/${{ matrix.service.image }}.tar
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-${{ matrix.service.image }}'

      - name: Display Trivy scan summary
        run: |
          echo "Security scan completed for ${{ matrix.service.name }}"

  docker-push:
    runs-on: ubuntu-latest
    name: Publish Docker Images
    needs: security-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: Core-Converter-Service
            image: swiftbridge-core
          - name: Orchestrator-Service
            image: swiftbridge-orchestrator

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service.image }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service.name }}
          file: ./${{ matrix.service.name }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  pipeline-summary:
    runs-on: ubuntu-latest
    name: Pipeline Summary
    needs: [build, code-quality]
    if: always()

    steps:
      - name: Check build status
        run: |
          echo "## SwiftBridge CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Status" >> $GITHUB_STEP_SUMMARY
          echo "- Build job: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Code quality: ${{ needs.code-quality.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Services" >> $GITHUB_STEP_SUMMARY
          echo "- Core Converter Service: Tested" >> $GITHUB_STEP_SUMMARY
          echo "- Orchestrator Service: Tested" >> $GITHUB_STEP_SUMMARY

      - name: Fail if build failed
        if: needs.build.result == 'failure'
        run: exit 1
