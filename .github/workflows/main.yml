name: SwiftBridge CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  checks: write
  contents: read

jobs:
  build-and-test:
    name: Build and Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [Core-Converter-Service, Orchestrator-Service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven (Skip Tests)
        run: mvn -f ${{ matrix.service }}/pom.xml clean install -DskipTests -B

      - name: Run Unit Tests
        run: mvn -f ${{ matrix.service }}/pom.xml test -B

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        with:
          files: "${{ matrix.service }}/target/surefire-reports/TEST-*.xml"
          check_name: "Test Results (${{ matrix.service }})"
