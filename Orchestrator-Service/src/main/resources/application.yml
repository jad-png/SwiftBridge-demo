spring:
  application:
    name: orchestrator-service
    description: SwiftBridge Orchestrator Service

  datasource:
    url: jdbc:postgresql://swiftbridge_postgres:5432/swiftbridge
    username: swiftbridge_user
    password: SwiftBridge@123!Secure
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
          fetch_size: 50

  flyway:
    enabled: true
    baseline-on-migrate: true

    jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: true
    deserialization:
      fail-on-unknown-properties: false

server:
  port: 8080
  tomcat:
    threads:
      max: 200
      min-spare: 10
    connection-timeout: 20000

logging:
  level:
    root: INFO
    com.swiftbridge.orchestrator: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

app:
  core-converter:
    url: http://core-converter-service:8081
    connect-timeout: 5000
    read-timeout: 10000

  security:
    jwt:
      enabled: true
      secret: ${JWT_SECRET:VGhpcy1pcy1hLXZlcnktc2VjdXJlLXNlY3JldC1rZXktMTIzNDU2Nzg5MA}
      expiration: 86400000

  jwt:
    issuer: swiftbridge
    cookie-name: jwt-token

  transaction:
    max-retry-attempts: 3
    retry-delay-ms: 1000
converter:
  service:
    url: http://core-converter-service:8081
    endpoint: /api/v1/internal/convert
