services:

  postgres-db:
    image: postgres:16-alpine
    container_name: swiftbridge_postgres

    environment:
      POSTGRES_DB: swiftbridge
      POSTGRES_USER: swiftbridge_user
      POSTGRES_PASSWORD: SwiftBridge@123!Secure
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - swiftbridge_network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swiftbridge_user"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    restart: unless-stopped

    security_opt:
      - no-new-privileges:true

  orchestrator-service:
    build:
      context: ./Orchestrator-Service
      dockerfile: Dockerfile
    container_name: swiftbridge_orchestrator

    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_OPTS: "-Xmx512m -Xms256m"

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/swiftbridge
      SPRING_DATASOURCE_USERNAME: swiftbridge_user
      SPRING_DATASOURCE_PASSWORD: SwiftBridge@123!Secure
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

      APP_CORE_CONVERTER_URL: http://core-converter-service:8081

    ports:
      - "8080:8080"

    networks:
      - swiftbridge_network

    depends_on:
      postgres-db:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

    restart: unless-stopped

    security_opt:
      - no-new-privileges:true

    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  core-converter-service:
    build:
      context: ./Core-Converter-Service
      dockerfile: Dockerfile
    container_name: swiftbridge_converter

    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_OPTS: "-Xmx256m -Xms128m"

    ports:
      - "8081:8081"

    networks:
      - swiftbridge_network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/v1/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

    restart: unless-stopped

    security_opt:
      - no-new-privileges:true

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 512M
        reservations:
          cpus: '1.0'
          memory: 256M

networks:
  swiftbridge_network:
    name: swiftbridge_network
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
volumes:
  postgres_data:
    name: swiftbridge_postgres_data
    driver: local
