services:

  postgres-db:
    image: ${POSTGRES_IMAGE}
    container_name: swiftbridge_postgres

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256

    ports:
      - "${DB_PORT}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - swiftbridge_network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    restart: unless-stopped

    security_opt:
      - no-new-privileges:true

  orchestrator-service:
    build:
      context: ./Orchestrator-Service
      dockerfile: Dockerfile
    container_name: swiftbridge_orchestrator

    environment:
      SPRING_PROFILES_ACTIVE: ${ORCHESTRATOR_PROFILE}
      SERVER_PORT: ${ORCHESTRATOR_PORT}
      JAVA_OPTS: ${ORCHESTRATOR_JAVA_OPTS}
      SPRING_DATASOURCE_URL: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${JPA_HIBERNATE_DDL_AUTO}
      APP_SECURITY_JWT_SECRET: ${JWT_SECRET}
      APP_SECURITY_JWT_EXPIRATION: ${JWT_EXPIRATION}
      APP_JWT_ISSUER: ${JWT_ISSUER}
      APP_JWT_COOKIE_NAME: ${JWT_COOKIE_NAME}
      APP_CORE_CONVERTER_URL: ${CORE_CONVERTER_URL}
      CONVERTER_SERVICE_URL: ${CORE_CONVERTER_URL}
      CONVERTER_SERVICE_ENDPOINT: ${CONVERTER_ENDPOINT}

    ports:
      - "${ORCHESTRATOR_PORT}:${ORCHESTRATOR_PORT}"

    networks:
      - swiftbridge_network

    depends_on:
      postgres-db:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

    restart: unless-stopped

    security_opt:
      - no-new-privileges:true

    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  core-converter-service:
    build:
      context: ./Core-Converter-Service
      dockerfile: Dockerfile
    container_name: swiftbridge_converter

    environment:
      SPRING_PROFILES_ACTIVE: ${CONVERTER_PROFILE}
      SERVER_PORT: ${CONVERTER_PORT}
      JAVA_OPTS: ${CONVERTER_JAVA_OPTS}
      APP_SECURITY_INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      APP_CONVERTER_BATCH_ENABLED: ${CONVERTER_BATCH_ENABLED}
      APP_CONVERTER_BATCH_SIZE: ${CONVERTER_BATCH_SIZE}
      APP_CONVERTER_VALIDATION_MODE: ${CONVERTER_VALIDATION_MODE}

    ports:
      - "${CONVERTER_PORT}:${CONVERTER_PORT}"

    networks:
      - swiftbridge_network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/v1/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

    restart: unless-stopped

    security_opt:
      - no-new-privileges:true

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 512M
        reservations:
          cpus: '1.0'
          memory: 256M

networks:
  swiftbridge_network:
    name: ${DOCKER_NETWORK}
    driver: bridge
    ipam:
      config:
        - subnet: ${DOCKER_NETWORK_SUBNET}
volumes:
  postgres_data:
    name: ${POSTGRES_VOLUME}
    driver: local
